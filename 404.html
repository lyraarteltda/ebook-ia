<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — E-book IA · Maestros da IA</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%232a2118'/%3E%3Crect x='9' y='7' width='14' height='18' rx='1.5' fill='%23fbf8f1'/%3E%3Crect x='9' y='7' width='3' height='18' fill='%23a8842c'/%3E%3C/svg%3E">
  <style>
    :root {
      --paper:#f4efe4; --paper-2:#fbf8f1; --ink:#2a2118; --soft:#6b5d49;
      --gold:#a8842c; --gold-deep:#8a6a1f; --rule:#d8ccb4;
      --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
      --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }
    * { margin:0; box-sizing:border-box; }
    body { font-family:var(--sans); background:var(--paper); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .box { text-align:center; max-width:480px; background:var(--paper-2); border:1px solid var(--rule); border-radius:14px; padding:48px 40px; box-shadow:0 14px 34px -22px rgba(42,33,24,.55); }
    .code { font-family:var(--serif); font-size:64px; color:var(--gold); line-height:1; margin-bottom:8px; }
    h1 { font-family:var(--serif); font-size:26px; font-weight:600; margin-bottom:12px; }
    p { color:var(--soft); margin-bottom:26px; }
    a.btn { display:inline-block; background:linear-gradient(180deg,#b8923a,var(--gold-deep)); color:#fff7e6; text-decoration:none; font-weight:600; padding:13px 26px; border-radius:9px; }
    a.btn:hover { filter:brightness(1.05); }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>Esta página não existe ou foi movida. Volte para a ferramenta.</p>
    <a class="btn" href="/index.html">Voltar para a E-book IA</a>
  </div>
</body>
</html>
